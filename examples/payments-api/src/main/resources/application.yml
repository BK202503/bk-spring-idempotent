spring:
  datasource:
    url: jdbc:h2:mem:payments;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver

server:
  port: 8080

idempotent:
  storage: JDBC
  initialize-schema: true
  metrics-enabled: true

logging:
  level:
    io.github.idempotentkt: INFO
    io.github.idempotentkt.example: INFO
